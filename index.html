<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./src/css/styles.css">
  <title>NaN Happens...Sometimes</title>
</head>
<body>
    <h1>NaN Happens...Sometimes</h1>

    <div class="calculator">
      <div class="top">
        <div class="display">0</div>
      </div>  
      <div class="bottom">
        <div class="buttons">
          <div id="1" class="row">
            <button class="num btn" id="7">7</button>
            <button class="num btn" id="8">8</button>
            <button class="num btn" id="9">9</button>
            <button class="op btn" id="÷">÷</button>
          </div>
          <div id="2" class="row">
            <button class="num btn" id="4">4</button>
            <button class="num btn" id="5">5</button>
            <button class="num btn" id="6">6</button>
            <button class="op btn" id="x">x</button>
          </div>
          <div id="3" class="row">
            <button class="num btn" id="1">1</button>
            <button class="num btn" id="2">2</button>
            <button class="num btn" id="3">3</button>
            <button class="op btn" id="-">-</button>
          </div>
          <div id="4 class="row">
            <button class="num btn" id="0">0</button>
            <button class="num btn" id=".">.</button>
            <button class="num btn" id="=">=</button>
            <button class="op btn" id="+">+</button>
          </div>
          <div id="5" class="row">
            <button class="clear btn double" id="clear">Clear</button>
            <button class="delete btn double" id="delete">Delete</button>
          </div>
        </div>
      </div>
    </div>

  <script src="./src/js/script.js"></script>
  <script src="./src/js/calculator.js"></script>
</body>
</html>
